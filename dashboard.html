<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Light Evangelist Ministry</title>
    <link rel="stylesheet" href="admin-dashboard.css">
</head>
<body>

<!-- Sidebar -->
<aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
        <img src="logo_converted.svg" class="logo">
        <h2>Admin Panel</h2>
    </div>

    <nav class="sidebar-nav">
        <button class="nav-item active" data-section="overview">📊 Dashboard</button>
        <button class="nav-item" data-section="background">🖼️ Background Images</button>
        <button class="nav-item" data-section="hero">🎬 Hero Slides</button>
        <button class="nav-item" data-section="director">👤 Church Vision</button>
        <button class="nav-item" data-section="staff">👥 Church Leadership</button>
        <button class="nav-item" data-section="news">📰 Updates</button>
        <button class="nav-item" data-section="events">📅 Events</button>
        <button class="nav-item" data-section="gallery">🖼️ Gallery</button>
        <button class="nav-item" data-section="messages">💬 Messages</button>
        <button class="nav-item" data-section="settings">⚙️ Settings</button>
        <button class="nav-item logout" id="logoutBtn">🚪 Logout</button>
    </nav>
</aside>

<!-- Main -->
<main class="main-content">

<header class="top-header">
    <div class="header-left">
        <h1>Admin Dashboard</h1>
    </div>
    <div class="header-right">
        <span id="userName">Admin</span>
    </div>
</header>

<div class="content-area">

<!-- OVERVIEW -->
<section id="overview-section" class="section active">
    <h2>Dashboard Overview</h2>

    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-label">News</div>
            <div id="newsCount">0</div>
        </div>

        <div class="stat-card">
            <div class="stat-label">Staff</div>
            <div id="staffCount">0</div>
        </div>

        <div class="stat-card">
            <div class="stat-label">Events</div>
            <div id="eventsCount">0</div>
        </div>

        <div class="stat-card">
            <div class="stat-label">Messages</div>
            <div id="messagesCount">0</div>
        </div>
    </div>
</section>

<!-- BACKGROUND -->
<section id="background-section" class="section">
    <h2>Background Images</h2>

    <input type="file" id="bgFile">
    <button id="addBgBtn">Upload Background</button>

    <div id="backgroundList"></div>
</section>

<!-- HERO -->
<section id="hero-section" class="section">
    <h2>Hero Slides</h2>

    <input type="file" id="heroFile">
    <input type="text" id="heroCaption" placeholder="Caption">
    <button id="addHeroBtn">Add Hero</button>

    <div id="heroList"></div>
</section>

<!-- DIRECTOR -->
<section id="director-section" class="section">
    <h2>Church Vision</h2>

    <form id="directorForm">
        <input id="directorTitle" placeholder="Title">
        <textarea id="directorMessage" placeholder="Message"></textarea>
        <input id="directorImage" placeholder="Image URL">
        <button type="submit">Save</button>
    </form>
</section>

<!-- STAFF -->
<section id="staff-section" class="section">
    <h2>Church Leadership</h2>

    <input type="file" id="staffFile">
    <input type="text" id="staffName" placeholder="Name">
    <input type="text" id="staffPosition" placeholder="Position">
    <button id="addStaffBtn">Add Staff</button>

    <div id="staffList"></div>
</section>

<!-- NEWS -->
<section id="news-section" class="section">
    <h2>News</h2>

    <input type="text" id="newsTitle" placeholder="Title">
    <input type="text" id="newsSlug" placeholder="Slug">
    <textarea id="newsPreviewText" placeholder="Preview"></textarea>
    <textarea id="newsContent" placeholder="Content"></textarea>

    <input type="file" id="newsFile">

    <button id="addNewsBtn">Add News</button>

    <div id="newsList"></div>
</section>

<!-- EVENTS -->
<section id="events-section" class="section">
    <h2>Events</h2>

    <input type="text" id="eventTitle" placeholder="Title">
    <textarea id="eventDescription" placeholder="Description"></textarea>
    <input type="datetime-local" id="eventDate">
    <input type="file" id="eventFile">

    <button id="addEventBtn">Add Event</button>

    <div id="eventsList"></div>
</section>

<!-- GALLERY -->
<section id="gallery-section" class="section">
    <h2>Gallery</h2>

    <select id="galleryType">
        <option value="image">Image</option>
        <option value="video">Video</option>
    </select>

    <input type="file" id="galleryFile">
    <input type="text" id="galleryVideoUrl" placeholder="Video URL">
    <input type="text" id="galleryCaption" placeholder="Caption">

    <button id="addGalleryBtn">Add Item</button>

    <div id="galleryList"></div>
</section>

<!-- MESSAGES -->
<section id="messages-section" class="section">
    <h2>Messages</h2>
    <div id="messagesList"></div>
</section>

</div>
</main>

<script src="admin-dashboard.js"></script>
</body>
</html>
